name: Daily HEMA tournament scrape

on:
  schedule:
    # 03:42 UTC daily — runs an hour before the consuming app's refresh job (04:17).
    - cron: "42 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-events
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci || npm install

      - name: Scrape HEMA Scorecard
        run: npm run scrape

      - name: Merge scraped + manual → events.json
        run: npm run build

      - name: Commit changes (if any)
        run: |
          if [[ -z "$(git status --porcelain events.json scraped-events.json)" ]]; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add events.json scraped-events.json
          git commit -m "chore: refresh tournament feed"
          git push
